{% extends "base.html" %} {% block content %}
<section class="page-shell">
  <div class="page-intro">
    <p class="section-kicker">Home Health</p>
    <h1 class="page-title">Update {{ hhc_obj.name }}</h1>
    <p class="page-subtitle">Refine this provider entry in the updated form layout.</p>
  </div>
  <div class="panel form-panel">
    <form action="" method="POST" class="form-shell">
      {% csrf_token %}
      <div>{{ form.as_p }}</div>
      <input type="submit" value="Save Changes" class="btn btn-warning" />
    </form>
  </div>
</section>
{% endblock content %}
